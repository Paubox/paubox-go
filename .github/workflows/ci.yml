name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -----------------------------------------------------------------------
  # Tests
  # -----------------------------------------------------------------------
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - run: go mod download
      - run: go mod verify

      - name: Run tests with race detector
        run: |
          # Exclude examples — they are runnable programs requiring live credentials,
          # not unit-testable packages.
          PKGS=$(go list ./... | grep -v '/examples/')
          go test -race -coverprofile=coverage.out -covermode=atomic $PKGS

      - name: Enforce 85% coverage threshold
        run: |
          pct=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 85) { print "FAIL: coverage " p "% < 85%"; exit 1 } }'

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go }}
          path: coverage.out

  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  # -----------------------------------------------------------------------
  # Vulnerability check
  # -----------------------------------------------------------------------
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
